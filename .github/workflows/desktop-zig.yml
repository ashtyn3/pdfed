name: desktop-zig

on:
  workflow_dispatch:
  push:
    paths:
      - "desktop/zig-dvui/**"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-linux
          - os: macos-latest
            target: aarch64-macos
          - os: windows-latest
            target: x86_64-windows
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: desktop/zig-dvui
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.14.1
      - name: Build desktop binary
        run: zig build -Dtarget=${{ matrix.target }} -Doptimize=ReleaseSafe
